services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 8000
      FRONTEND_DIST_DIR: frontend/dist
      STATE_DB_PATH: /var/lib/optibot/state.db
      RUN_ARTIFACT: /var/lib/optibot/last_run.json
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - optibot_data:/var/lib/optibot

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    env_file:
      - .env
    environment:
      SCRAPER_CRON_SCHEDULE: "${SCRAPER_CRON_SCHEDULE:-0 3 * * *}"
      STATE_DB_PATH: /var/lib/optibot/state.db
      RUN_ARTIFACT: /var/lib/optibot/last_run.json
      OUT_DIR: /var/lib/optibot/markdown
    restart: unless-stopped
    volumes:
      - optibot_data:/var/lib/optibot

volumes:
  optibot_data:
